<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration - ManifGO</title>
    <link rel="stylesheet" href="/style/admin.css">
</head>

<body>

<header>
    <h1>Administration ManifGO</h1>
    <div class="Accueil">
                <a href="/HTML/accueil.html">Accueil</a> <!--Lien vers la page d'accueil-->
            </div>
</header>

<main>

    <!-- GESTION DES MANIFESTATIONS -->
    <section>
        <h2>Gestion des manifestations</h2>

        <button type="button">Modifier une manifestation</button>
        <button type="button">Exporter les données</button>

        <table>
            <thead>
                <tr>
                    <th>Titre</th>
                    <th>Date</th>
                    <th>Horaire</th>
                    <th>Catégorie</th>
                    <th>Statut</th>
                    <th>Intérêt</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Contenu dynamique qui sera mis à jour via JavaScript bien évidemment -->
            </tbody>
        </table>
    </section>


    <!-- FORMULAIRE AJOUT / MODIFICATION -->
    <section>
        <h2>Ajouter une nouvelle manifestation</h2>

        <form method="post" enctype="multipart/form-data">

            <label>Titre</label>
            <input type="text" name="titre" required>

            <label>Description</label>
            <textarea name="description" required></textarea>

            <label>Date</label>
            <input type="date" name="date" required>

            <label>Horaire</label>
            <input type="time" name="horaire" required>

            <label>Catégorie</label>
            <select name="categorie" required>
                <!-- Catégories dynamiques -->
            </select>

            <label>Image</label>
            <input type="file" name="image" accept="image/*">

            <label>Statut</label>
            <select name="statut" required>
                <option value="affichee">Affichée</option>
                <option value="modification">En cours de modification</option>
                <option value="archivee">Archivée</option>
            </select>

            <button type="submit">Enregistrer</button>

        </form>
    </section>


    <!-- STATISTIQUES -->
    <section>
        <h2>Manifestations avec le plus d’intérêt</h2>
        <ul>
            <!-- Liste dynamique -->
        </ul>
    </section>

</main>

</body>
</html>
