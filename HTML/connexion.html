<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <script src="/xJava/connexion.js" type="module" defer></script>
    <link rel="stylesheet" href="/style/connexion.css" />
    <title>Connexion - ManifGO</title>
    <link rel="icon" type="image/png" href="/Images/Icone Site.png" />
    <!--Icône du site-->
  </head>

  <body>
    <header>
      <h1>
        Bienvenue sur l'interface ADMIN de ManifGO!<br />
        Veuillez vous connecter...
      </h1>
    </header>

    <div class="container">
      <div class="tab-body" data-id="connexion">
        <form>
          <div class="row">
            <i class="far fa-user"></i>
            <input type="email" class="input" placeholder="Adresse Mail" />
          </div>
          <div class="row">
            <i class="fas fa-lock"></i>
            <input placeholder="Mot de Passe" type="password" class="input" />
          </div>
          <button class="btn" type="button">Connexion</button>
        </form>
      </div>

      <div class="tab-footer">
        <a
          class="tab-link active"
          data-ref="connexion"
          href="javascript:void(0)"
        </a
      </div>
    </div>
  </body>
</html>
